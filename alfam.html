            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1.6rem;
            font-weight: 800;
            color: #1e40af;
            text-shadow: 2px 2px 0 #fde68a;
            margin-bottom: 0.3rem;
            flex-wrap: wrap;
            text-align: center;
        }

        .subhead {
            text-align: center;
            color: #78350f;
            font-weight: 700;
            margin-bottom: 1.2rem;
            background: #fef3c7;
            display: inline-block;
            padding: 0.3rem 1.5rem;
            border-radius: 2rem;
            margin-left: auto;
            margin-right: auto;
            width: fit-content;
            font-size: 0.85rem;
            border: 1px solid #fbbf24;
        }

        .badge {
            background: #dc2626;
            color: white;
            font-size: 0.7rem;
            padding: 0.2rem 0.8rem;
            border-radius: 1rem;
            font-weight: 800;
        }

        .control-panel {
            background: #1c1917;
            border-radius: 2rem;
            padding: 1.2rem 1rem;
            margin-bottom: 1.5rem;

            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: #292524;
            padding: 0.4rem 1rem;
            border-radius: 3rem;
        }

        .input-group label {
            font-weight: 700;
            color: #fed7aa;
            font-size: 1rem;
        }

        .input-group input,

            width: 75px;
            padding: 0.6rem 0.4rem;
            text-align: center;
            font-weight: 800;
            font-size: 1.1rem;
            background: #fef7ed;
            border: 2px solid #f59e0b;
            border-radius: 1.5rem;
            color: #78350f;
            outline: none;
        }

        .input-group select {
            width: auto;
            font-size: 0.85rem;
        }

        .btn {
            background: #f59e0b;
            border: none;
            color: #1c1917;
            font-weight: 800;
            padding: 0.65rem 1.5rem;
            border-radius: 3rem;
            font-size: 0.9rem;
            cursor: pointer;
            background: linear-gradient(to bottom, #fbbf24, #d97706);
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.5);
            transition: 0.2s;
            border: 1px solid #fde68a;
        }

        .btn:hover {
            background: linear-gradient(to bottom, #fcd34d, #b45309);
            box-shadow: 0 6px 14px #f59e0b80;
        }

            gap: 0.4rem;
            justify-content: center;
            margin: 1rem 0 0.5rem;
            flex-wrap: wrap;
        }

        .cat-tab {

            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2.5rem;
            font-weight: 700;
            font-size: 0.78rem;
            cursor: pointer;
            transition: 0.2s;
            color: #44403c;
            background: #d6d3d1;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            white-space: nowrap;
        }

            background: #1e40af;
            color: white;
            box-shadow: 0 0 15px #60a5fa;
            border: 1px solid #bfdbfe;
        }

        .cat-tab.seafood-active {
            background: #0891b2;
            box-shadow: 0 0 15px #22d3ee;
            border: 1px solid #a5f3fc;
        }

        .cat-tab.sauce-active {

            box-shadow: 0 0 15px #c084fc;
            border: 1px solid #e9d5ff;
        }

            justify-content: center;
            margin: 0.8rem 0 0.5rem;
            flex-wrap: wrap;
        }

        .sub-tab {

            border: 1px solid #fcd34d;
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.72rem;

            color: #1c1917;

            padding: 1.2rem 1rem;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.25);

            background: #fde68a;

            padding: 0.6rem 0.8rem;
            margin: 0.5rem 0;

            font-weight: 600;

            border-radius: 1rem;
            padding: 0.6rem 0.8rem;
            margin: 0.5rem 0;
            color: #14532d;

                    step2: {

                        groups: [

                lemonButter: {

                    baseDesc: "Best with: Goan, Turkish, prawns",
                    baseKg: 0.18,
                    step2: {
                        title: "🥣 Melt & mix",
                        groups: [
                            {
                                name: "🧈 Ingredients", items: [
                                    { name: "Butter", gram: 120 },
                                    { name: "Garlic (fine chopped)", gram: 20 },
                                    { name: "Lemon juice", gram: 35 },
                                    { name: "Parsley", gram: 6, note: "2 tbsp" },

                                    { name: "Salt", gram: 3, note: "to taste" }

                            }
                        ]
                    },
                    result: "✔ glossy · ✔ rich · ✔ unforgettable aroma"
                }
            };

            const PAIRING_DATA = [
                { fish: "King / Surmai", variant: "Arabic / Turkish", sauce: "Garlic Dip / Tahini" },
                { fish: "Sankh", variant: "Goan / Arabic", sauce: "Lemon Butter" },
                { fish: "Pomfret", variant: "Turkish", sauce: "Tahini" },
                { fish: "Jeera / Safeed", variant: "Goan", sauce: "Lemon Butter" },
                { fish: "Prawns", variant: "Arabic / Turkish", sauce: "Garlic Dip" }
            ];

            const catTabs = {
                alfam: { label: '🍗 Alfam Chicken', subRecipes: ['fullLeg', 'tangdi', 'breastShawarma'] },
                seafood: { label: '🐟 Seafood Grill', subRecipes: ['alfamRedFish', 'whiteButterFish', 'butterPepperPrawns', 'arabicGrill', 'goanGrill', 'turkishGrill'] },
                sauces: { label: '🥣 Sauces', subRecipes: ['arabicGarlicDip', 'tahiniLemon', 'lemonButter'] },
                pairing: { label: '📋 Pairing Guide', subRecipes: [] }
            };

            let currentCat = 'alfam';
            let currentSub = 'fullLeg';
            let scaleVal = 1;
            let scaleMode = 'multiply';

            const batchScaleInput = document.getElementById('batchScale');
            const scaleModeSelect = document.getElementById('scaleMode');
            const applyBtn = document.getElementById('applyBtn');
            const categoryTabs = document.getElementById('categoryTabs');
            const subTabsDiv = document.getElementById('subTabs');
            const dynamicDiv = document.getElementById('dynamicRecipe');

            function formatSpoon(grams) {
                if (grams <= 0) return "0";
                if (grams < 1) {
                    const tsp = grams * 0.2;
                    if (tsp < 0.125) return `${grams.toFixed(1)}g`;
                    const fractions = { 0.125: '⅛', 0.25: '¼', 0.33: '⅓', 0.5: '½', 0.67: '⅔', 0.75: '¾' };
                    let closest = '', minDiff = Infinity;
                    for (const [val, frac] of Object.entries(fractions)) {
                        const diff = Math.abs(tsp - parseFloat(val));
                        if (diff < minDiff && diff < 0.1) { minDiff = diff; closest = frac; }
                    }
                    if (closest) return `${closest} tsp`;
                    return `${tsp.toFixed(1)} tsp`;
                }
                const tbsp = grams / 15;
                if (tbsp >= 0.5) {
                    const whole = Math.floor(tbsp);
                    const frac = tbsp - whole;
                    const fractions = { 0.125: '⅛', 0.25: '¼', 0.33: '⅓', 0.5: '½', 0.67: '⅔', 0.75: '¾' };
                    let fracStr = '', minDiff = 0.08;
                    for (const [val, f] of Object.entries(fractions)) {
                        const diff = Math.abs(frac - parseFloat(val));
                        if (diff < minDiff) { minDiff = diff; fracStr = f; }
                    }
                    if (whole === 0 && fracStr) return `${fracStr} tbsp`;
                    if (whole > 0 && fracStr) return `${whole}${fracStr} tbsp`;
                    if (whole > 0 && frac < 0.1) return `${whole} tbsp`;
                    return `${tbsp.toFixed(1)} tbsp`;
                }
                return `${(grams * 0.2).toFixed(1)} tsp`;
            }

            function getScaleFactor(recipe) {
                if (scaleMode === 'kg') {
                    return scaleVal / recipe.baseKg;
                }
                return scaleVal;
            }

            function scaleItems(items, factor) {
                return items.map(item => ({
                    ...item,
                    gram: parseFloat((item.gram * factor).toFixed(1))
                }));
            }

            function buildCategoryTabs() {
                categoryTabs.innerHTML = '';
                Object.entries(catTabs).forEach(([key, val]) => {
                    const btn = document.createElement('button');
                    btn.className = 'cat-tab';
                    btn.textContent = val.label;
                    btn.dataset.cat = key;
                    btn.addEventListener('click', () => switchCategory(key));
                    categoryTabs.appendChild(btn);
                });
            }

            function buildSubTabs() {
                subTabsDiv.innerHTML = '';
                const subs = catTabs[currentCat].subRecipes;
                if (subs.length === 0) {
                    subTabsDiv.style.display = 'none';
                    return;
                }
                subTabsDiv.style.display = 'flex';
                subs.forEach(key => {
                    const btn = document.createElement('button');
                    btn.className = 'sub-tab';
                    btn.textContent = RECIPES[key].name.split(':')[0] || RECIPES[key].name.substring(0, 25);
                    btn.dataset.sub = key;
                    btn.addEventListener('click', () => switchSub(key));
                    subTabsDiv.appendChild(btn);
                });
            }

            function updateStyles() {
                document.querySelectorAll('#categoryTabs .cat-tab').forEach(t => {
                    t.classList.remove('active', 'seafood-active', 'sauce-active');
                    if (t.dataset.cat === currentCat) {
                        if (currentCat === 'seafood') t.classList.add('seafood-active');
                        else if (currentCat === 'sauces') t.classList.add('sauce-active');
                        else t.classList.add('active');
                    }
                });
                document.querySelectorAll('#subTabs .sub-tab').forEach(t => {
                    t.classList.remove('active');
                    if (t.dataset.sub === currentSub) t.classList.add('active');
                });
            }

            function switchCategory(cat) {
                currentCat = cat;
                const subs = catTabs[cat].subRecipes;
                currentSub = subs.length > 0 ? subs[0] : null;
                buildSubTabs();
                updateStyles();
                if (currentSub) renderRecipe(currentSub);
                else renderPairing();
            }

            function switchSub(sub) {
                currentSub = sub;
                updateStyles();
                renderRecipe(sub);
            }

            function renderRecipe(key) {
                const recipe = RECIPES[key];
                if (!recipe) return;

                const factor = getScaleFactor(recipe);
                const modeLabel = scaleMode === 'kg' ? `Per ${scaleVal}kg Input` : `×${scaleVal} Batch`;
                const scaledBaseKg = parseFloat((recipe.baseKg * factor).toFixed(2));

                let html = `
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.4rem; margin-bottom:0.4rem;">
          <h2 style="color:#1e40af; margin:0; font-size:1rem;">${recipe.name}</h2>
          <span style="background:#1c1917; color:#fbbf24; padding:0.25rem 0.8rem; border-radius:2rem; font-weight:bold; font-size:0.75rem;">
            ${modeLabel} | ~${scaledBaseKg}kg
          </span>
        </div>
        <div class="info-box">📌 Base: ${recipe.baseDesc} (${recipe.baseKg}kg) · Factor: ${factor.toFixed(2)}x</div>
      `;

                // Step 1
                if (recipe.step1) {
                    html += `<div class="section-title">${recipe.step1.title}</div>`;
                    html += `<div class="ingredient-list">`;
                    const items = scaleItems(recipe.step1.items, factor);
                    items.forEach(item => {
                        const noteText = item.note ? ` (${item.note})` : '';
                        html += `
            <div class="ing-row">
              <span class="ing-name">🧾 ${item.name}${noteText}</span>
              <span class="ing-qty"><span>${item.gram}g</span><span class="spoon-hint">${formatSpoon(item.gram)}</span></span>
            </div>`;
                    });
                    html += `</div>`;
                }

                // Step 2
                if (recipe.step2) {
                    html += `<div class="section-title">${recipe.step2.title}</div>`;
                    if (recipe.step2.groups) {
                        recipe.step2.groups.forEach(group => {
                            html += `<div style="font-weight:700; color:#78350f; margin:0.4rem 0 0.2rem; font-size:0.8rem;">${group.name}</div>`;
                            html += `<div class="ingredient-list">`;
                            const items = scaleItems(group.items, factor);
                            items.forEach(item => {
                                const noteText = item.note ? ` (${item.note})` : '';
                                html += `
                <div class="ing-row">
                  <span class="ing-name">🧾 ${item.name}${noteText}</span>
                  <span class="ing-qty"><span>${item.gram}g</span><span class="spoon-hint">${formatSpoon(item.gram)}</span></span>
                </div>`;
                            });
                            html += `</div>`;
                        });
                    }
                }

                // Rest time
                if (recipe.restTime) {
                    html += `<div class="info-box"><strong>🕒 Rest:</strong> ${recipe.restTime}</div>`;
                }

                // Result
                if (recipe.result) {
                    html += `<div class="success-box">${recipe.result}</div>`;
                }

                // Half cook & Final cook & Shelf life
                if (recipe.halfCook || recipe.finalCook || recipe.shelfLife) {
                    html += `<div class="sop-step">`;
                    if (recipe.halfCook) html += `<strong>❄️ Half Cook:</strong> ${recipe.halfCook}<br>`;
                    if (recipe.finalCook) html += `<strong>🔥 Final Cook:</strong> ${recipe.finalCook}<br>`;
                    if (recipe.shelfLife) html += `<strong>⏳ Shelf Life:</strong> ${recipe.shelfLife}`;
                    html += `</div>`;
                }

                dynamicDiv.innerHTML = html;
            }

            function renderPairing() {
                let html = `
        <h2 style="color:#1e40af; margin:0 0 0.8rem 0; font-size:1rem;">📋 CHEF PAIRING GUIDE</h2>
        <div class="info-box">🧠 Memory Logic - Pehli bite yaad rahegi, doosri craving banegi, teesri baar order karega</div>
        <table class="pairing-table">
          <tr><th>🐟 Fish Type</th><th>🔥 Best Variant</th><th>🥣 Best Sauce</th></tr>
      `;
                PAIRING_DATA.forEach(row => {
                    html += `<tr><td><strong>${row.fish}</strong></td><td>${row.variant}</td><td>${row.sauce}</td></tr>`;
                });
                html += `</table>
        <div class="success-box" style="margin-top:0.8rem;">
          <strong>🏆 FINAL WORD</strong><br>
          Ye sirf recipes nahi, ye <strong>brand blueprint</strong> hai.<br>
          ✔ Smell = clean, smoky, luxurious<br>
          ✔ Taste = layered, addictive<br>
          ✔ Texture = juicy, flaky, never dry<br>
          ✔ Craving factor = VERY HIGH<br>
          ✔ Freezer ke baad bhi restaurant fresh
        </div>
      `;
                dynamicDiv.innerHTML = html;
            }

            function onCalculate() {
                let val = parseFloat(batchScaleInput.value);
                if (isNaN(val) || val < 0.25) val = 0.25;
                if (val > 20) val = 20;
                batchScaleInput.value = val;
                scaleVal = val;
                scaleMode = scaleModeSelect.value;
                if (currentCat === 'pairing') renderPairing();
                else if (currentSub) renderRecipe(currentSub);
            }

            scaleModeSelect.addEventListener('change', () => {
                scaleMode = scaleModeSelect.value;
                onCalculate();
            });

            applyBtn.addEventListener('click', onCalculate);
            batchScaleInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') onCalculate(); });
            batchScaleInput.addEventListener('input', () => {
                let val = parseFloat(batchScaleInput.value);
                if (!isNaN(val) && val >= 0.25 && val <= 20) {
                    scaleVal = val;
                    scaleMode = scaleModeSelect.value;
                    if (currentCat === 'pairing') renderPairing();
                    else if (currentSub) renderRecipe(currentSub);
                }
            });

            // Init
            buildCategoryTabs();
            buildSubTabs();
            updateStyles();
            renderRecipe('fullLeg');
            batchScaleInput.value = 1;
            scaleModeSelect.value = 'multiply';
        })();
    </script>
