        (function () {
            const TSP_PER_GRAM = 0.2;
            const TBSP_PER_GRAM = 1 / 15;

            function formatSpoon(grams) {
                if (grams <= 0) return "0";
                if (grams < 1) {
                    const tsp = grams * TSP_PER_GRAM;
                    if (tsp < 0.125) return `${grams.toFixed(2)}g`;
                    const fractions = { 0.125: '⅛', 0.25: '¼', 0.33: '⅓', 0.5: '½', 0.67: '⅔', 0.75: '¾' };
                    let closest = '', minDiff = Infinity;
                    for (const [val, frac] of Object.entries(fractions)) {
                        const diff = Math.abs(tsp - parseFloat(val));
                        if (diff < minDiff && diff < 0.1) { minDiff = diff; closest = frac; }
                    }
                    if (closest) return `${closest} tsp`;
                    if (tsp >= 0.1) return `${tsp.toFixed(1)} tsp`;
                    return `${grams.toFixed(2)}g`;
                }
                const tbsp = grams * TBSP_PER_GRAM;
                if (tbsp >= 0.5) {
                    const whole = Math.floor(tbsp);
                    const frac = tbsp - whole;
                    const fractions = { 0.125: '⅛', 0.25: '¼', 0.33: '⅓', 0.5: '½', 0.67: '⅔', 0.75: '¾' };
                    let fracStr = '', minDiff = 0.08;
                    for (const [val, f] of Object.entries(fractions)) {
                        const diff = Math.abs(frac - parseFloat(val));
                        if (diff < minDiff) { minDiff = diff; fracStr = f; }
                    }
                    if (whole === 0 && fracStr) return `${fracStr} tbsp`;
                    if (whole > 0 && fracStr) return `${whole}${fracStr} tbsp`;
                    if (whole > 0 && frac < 0.1) return `${whole} tbsp`;
                    return `${tbsp.toFixed(1)} tbsp`;
                }
                const tsp = grams * TSP_PER_GRAM;
                return `${tsp.toFixed(1)} tsp`;
            }

            const tabKeys = [

            const tabLabels = {

                premiumMayo: '🥛 Premium Mayo',
                basicMayo: '🥛 Basic Mayo',
                budgetMayo: '💰 Budget Mayo',
                spicyMayo: '🌶 Spicy Mayo',
                cafeMayo: '☕ Cafe Mayo',

                redSpread: '🔴 Red Spread',
                pitaOrig: '🫓 Pita Orig',
                pitaFinal: '🫓 Pita Final',
                vegMixOrig: '🥗 Veg Orig',
                vegMixFinal: '🥗 Veg Final',
                tandooriMasala: '🧂 Masala'
            };

            let currentTab = 'marination';
            let currentQty = 12;

            const qtyInput = document.getElementById('batchQty');
            const applyBtn = document.getElementById('applyBtn');
            const tabContainer = document.getElementById('tabContainer');
            const dynamicDiv = document.getElementById('dynamicRecipe');

            function buildTabs() {
                tabContainer.innerHTML = '';
                tabKeys.forEach(key => {
                    const btn = document.createElement('button');
                    btn.className = 'tab';
                    btn.textContent = tabLabels[key];
                    btn.dataset.tab = key;
                    btn.addEventListener('click', () => switchTab(key));
                    tabContainer.appendChild(btn);
                });
            }

            function updateTabStyles(active) {
                document.querySelectorAll('#tabContainer .tab').forEach(t => {
                    t.classList.remove('active');
                    if (t.dataset.tab === active) t.classList.add('active');
                });
            }

            function scaleItems(baseItems, factor) {
                return baseItems.map(item => ({
                    ...item,
                    gram: parseFloat((item.gram * factor).toFixed(2))
                }));
            }

            function switchTab(key) {
                currentTab = key;
                updateTabStyles(key);
                render(key, currentQty);
            }

            function render(tabKey, qty) {
                const recipe = RECIPES[tabKey];
                const factor = qty / recipe.baseFor;
                const items = scaleItems(recipe.items, factor);

                let html = `
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem; margin-bottom:0.5rem;">
          <h2 style="color:#1e40af; margin:0;">${recipe.name}</h2>
          <span style="background:#1c1917; color:#fbbf24; padding:0.4rem 1.2rem; border-radius:2rem; font-weight:bold;">×${qty} Shawarma</span>
        </div>
        <div class="info-box">
          📌 Base batch: ${recipe.baseFor} Shawarma · Scaling factor: ${factor.toFixed(2)}x
          ${recipe.note ? `<br>📝 ${recipe.note}` : ''}
        </div>
        <div class="section-title">📋 Ingredients</div>
        <div class="ingredient-list">
      `;

                items.forEach(item => {
                    const noteText = item.note ? ` (${item.note})` : '';
                    html += `
          <div class="ing-row">
            <span class="ing-name">🧾 ${item.name}${noteText}</span>
            <span class="ing-qty">
              <span>${item.gram}g</span>
              ${item.gram > 0 ? `<span class="spoon-hint">${formatSpoon(item.gram)}</span>` : ''}
            </span>
          </div>
        `;
                });

                html += `</div>`;

                if (recipe.method) {
                    html += `<div class="info-box"><strong>🔧 Method:</strong><br>${recipe.method}</div>`;
                }

                dynamicDiv.innerHTML = html;
            }

            function onCalculate() {
                let qty = parseInt(qtyInput.value, 10);
                if (isNaN(qty) || qty < 1) qty = 1;
                if (qty > 200) qty = 200;
                qtyInput.value = qty;
                currentQty = qty;
                render(currentTab, currentQty);
            }

            applyBtn.addEventListener('click', onCalculate);
            qtyInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') onCalculate(); });
            qtyInput.addEventListener('input', () => {
                let qty = parseInt(qtyInput.value, 10);
                if (!isNaN(qty) && qty >= 1 && qty <= 200) {
                    currentQty = qty;
                    render(currentTab, currentQty);
                }
            });

            // Init
            buildTabs();
            updateTabStyles('marination');
            render('marination', 12);
            qtyInput.value = 12;
        })();
    </script>
</body>

</html>
