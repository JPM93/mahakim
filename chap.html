<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>🥩 Smoky Butter Pepper Chap | MFM Commercial</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥩</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1c0f00 0%, #3d1c00 100%);
            min-height: 100vh;
            padding: 1.5rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            max-width: 900px;
            width: 100%;
            background: #fff7ed;
            border-radius: 3rem 3rem 2.5rem 2.5rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6);
            padding: 2rem 1.8rem;
            border: 2px solid #fbbf24;
        }

        h1 {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1.8rem;
            font-weight: 800;
            color: #9a3412;
            text-shadow: 2px 2px 0 #fde68a;
            margin-bottom: 0.3rem;
            flex-wrap: wrap;
            text-align: center;
        }

        .subhead {
            text-align: center;
            color: #78350f;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: #fef3c7;
            display: inline-block;
            padding: 0.3rem 1.8rem;
            border-radius: 2rem;
            margin-left: auto;
            margin-right: auto;
            width: fit-content;
            font-size: 0.9rem;
            border: 1px solid #fbbf24;
        }

        .badge {
            background: #dc2626;
            color: white;
            font-size: 0.7rem;
            padding: 0.2rem 0.8rem;
            border-radius: 1rem;
            font-weight: 800;
        }

        .control-panel {
            background: #1c1917;
            border-radius: 2rem;
            padding: 1.5rem 1.2rem;
            margin-bottom: 1.8rem;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.6);
            color: #f5f5f4;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #292524;
            padding: 0.5rem 1.2rem;
            border-radius: 3rem;
        }

        .input-group label {
            font-weight: 700;
            color: #fed7aa;
            font-size: 1.1rem;
        }

        .input-group input,
        .input-group select {
            width: 90px;
            padding: 0.7rem 0.5rem;
            text-align: center;
            font-weight: 800;
            font-size: 1.3rem;
            background: #fef7ed;
            border: 2px solid #f59e0b;
            border-radius: 1.5rem;
            color: #78350f;
            outline: none;
        }

        .input-group select {
            width: auto;
            font-size: 1rem;
        }

        .btn {
            background: #f59e0b;
            border: none;
            color: #1c1917;
            font-weight: 800;
            padding: 0.75rem 1.8rem;
            border-radius: 3rem;
            font-size: 1rem;
            cursor: pointer;
            background: linear-gradient(to bottom, #fbbf24, #d97706);
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.5);
            transition: 0.2s;
            border: 1px solid #fde68a;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .btn:hover {
            background: linear-gradient(to bottom, #fcd34d, #b45309);
            box-shadow: 0 6px 14px #f59e0b80;
        }

        .tabs {
            display: flex;
            gap: 0.4rem;
            justify-content: center;
            margin: 1.5rem 0 1rem;
            flex-wrap: wrap;
        }

        .tab {
            background: #e7e5e4;
            border: none;
            padding: 0.55rem 1.1rem;
            border-radius: 2.5rem;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            color: #44403c;
            background: #d6d3d1;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            white-space: nowrap;
        }

        .tab.active {
            background: #9a3412;
            color: white;
            box-shadow: 0 0 15px #fb923c;
            border: 1px solid #fed7aa;
        }

        .recipe-card {
            background: #fffbeb;
            border-radius: 2rem;
            padding: 1.5rem 1.2rem;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.25);
            border: 1px solid #fcd34d;
            max-height: 65vh;
            overflow-y: auto;
        }

        .section-title {
            font-weight: 800;
            font-size: 1.15rem;
            margin: 1rem 0 0.6rem;
            color: #78350f;
            border-left: 8px solid #9a3412;
            padding-left: 1rem;
            background: linear-gradient(to right, #fef9c3, transparent);
        }

        .ingredient-list {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            margin-bottom: 0.5rem;
        }

        .ing-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffffffd6;
            padding: 0.4rem 0.8rem;
            border-radius: 1rem;
            font-size: 0.85rem;
            border-bottom: 1px dashed #fcd34d;
            gap: 0.5rem;
        }

        .ing-name {
            font-weight: 600;
            color: #3b2f1e;
            flex: 1;
            font-size: 0.85rem;
        }

        .ing-qty {
            font-weight: 800;
            background: #fef3c7;
            padding: 0.2rem 0.7rem;
            border-radius: 2rem;
            color: #92400e;
            font-size: 0.8rem;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .spoon-hint {
            font-weight: 600;
            color: #b45309;
            font-size: 0.75rem;
            background: #fde68a;
            padding: 0.1rem 0.5rem;
            border-radius: 1rem;
        }

        .info-box {
            background: #fef9c7;
            border-radius: 1.2rem;
            padding: 0.8rem 1rem;
            margin: 0.8rem 0;
            color: #713f12;
            font-weight: 500;
            font-size: 0.85rem;
            border: 1px solid #fcd34d;
        }

        .danger-box {
            background: #fef2f2;
            border: 2px solid #fca5a5;
            border-radius: 1.2rem;
            padding: 0.8rem 1rem;
            margin: 0.8rem 0;
            color: #991b1b;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .success-box {
            background: #f0fdf4;
            border: 2px solid #86efac;
            border-radius: 1.2rem;
            padding: 0.8rem 1rem;
            margin: 0.8rem 0;
            color: #14532d;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .footer-note {
            text-align: center;
            font-size: 0.75rem;
            color: #a16207;
            margin-top: 1rem;
            font-weight: 600;
        }

        .sop-step {
            background: #1c1917;
            color: #fcd34d;
            border-radius: 1.2rem;
            padding: 0.8rem 1rem;
            margin: 0.5rem 0;
            font-size: 0.8rem;
            border-left: 4px solid #f59e0b;
        }

        @media (max-width: 500px) {
            .app-container {
                padding: 1.2rem 0.8rem;
            }

            .ing-row {
                flex-wrap: wrap;
            }

            .tab {
                font-size: 0.7rem;
                padding: 0.4rem 0.7rem;
            }

            h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <h1>🥩 Smoky Butter Pepper Chap <span class="badge">COMMERCIAL</span></h1>
        <div style="text-align: center;"><span class="subhead">Airfryer · Frozen Ready · 60 Days</span></div>

        <div class="control-panel">
            <div class="input-group">
                <label>🥩</label>
                <input type="number" id="meatKg" value="3" min="0.5" max="100" step="0.1">
                <span style="color:#fcd34d; font-weight:bold;">Kg Raw Chap</span>
            </div>
            <div class="input-group">
                <label>🍖</label>
                <select id="meatType">
                    <option value="mutton">🐑 Mutton</option>
                    <option value="buffalo">🐃 Buffalo</option>
                </select>
            </div>
            <button class="btn" id="applyBtn"><span>🔄</span> Calculate</button>
        </div>

        <div class="tabs" id="tabContainer"></div>

        <div id="dynamicRecipe" class="recipe-card"></div>
        <div class="footer-note">🔥 -18°C = 60 days shelf life · Never refreeze · Cook above 75°C final</div>
    </div>

    <script>
        (function () {
            // Base recipe for 3 KG haddi wali chap
            const BASE_MEAT_KG = 3;

            const RECIPES = {
                softening: {
                    name: "🔪 STEP 1: Softening Marinade (Tender + Juicy)",
                    items: [
                        { name: "Thick Curd", gram: 500 },
                        { name: "Papaya Paste (raw) ⚠️", gram: 30, warn: true },
                        { name: "Ginger Garlic Paste", gram: 200 },
                        { name: "Lemon Juice", gram: 50 },
                        { name: "Mustard Oil (heated & cooled)", gram: 100 },
                        { name: "Salt", gram: 55 },
                        { name: "White Pepper", gram: 10 },
                        { name: "Kashmiri Chilli", gram: 25 },
                        { name: "Turmeric", gram: 3 }
                    ],
                    method: "Massage 5 min · Rest: Mutton 10-12 hrs / Buffalo 18 hrs (fridge)",
                    warn: "⚠️ Papaya limit cross mat karo warna meat mushy ho jaata!"
                },
                flavor: {
                    name: "🔥 STEP 2: Flavor Marinade (Coating Layer)",
                    items: [
                        { name: "Hung Curd", gram: 300 },
                        { name: "Fresh Cream", gram: 100 },
                        { name: "Butter (melted)", gram: 60 },
                        { name: "Cornflour", gram: 50 },
                        { name: "Rice Flour", gram: 40 },
                        { name: "Roasted Besan", gram: 30 },
                        { name: "Black Pepper Crushed", gram: 12 },
                        { name: "Garam Masala", gram: 8 },
                        { name: "Kasuri Methi", gram: 5 },
                        { name: "MSG (optional)", gram: 4 }
                    ],
                    method: "Mix & coat evenly · Rest: 2 hrs minimum"
                },
                cooking: {
                    name: "🍳 STEP 3: Airfryer Cooking",
                    items: [],
                    isInfo: true,
                    content: `
          <div class="info-box">
            <strong>🔥 Stage 1 – Cook Inside</strong><br>
            Temp → 170°C · Time → 22-25 min · Flip halfway · Light oil spray
          </div>
          <div class="info-box">
            <strong>🔥 Stage 2 – Crisp Finish</strong><br>
            Temp → 200°C · Time → 8-10 min · Butter brush once<br>
            Edges golden + sizzling smell = ready 😍
          </div>
        `
                },
                smoke: {
                    name: "🌪 STEP 4: Smoke Flavor (Optional)",
                    items: [],
                    isInfo: true,
                    content: `
          <div class="info-box">
            Burn charcoal · Steel bowl me rakho · 1 tsp ghee · Cover tray 3 min
          </div>
        `
                },
                finishing: {
                    name: "🌶 STEP 5: Finishing Toss (Dry Starter)",
                    items: [
                        { name: "Butter", gram: 30, note: "per 3kg batch" },
                        { name: "Garlic (chopped)", gram: 20, note: "per 3kg batch" },
                        { name: "Black Pepper", gram: 5, note: "per 3kg batch" },
                        { name: "Honey", gram: 5, note: "1 tsp per 3kg batch" }
                    ],
                    method: "Hot pan me toss 1 min · Sprinkle lemon drops"
                },
                frozenSOP: {
                    name: "❄️ FROZEN STORAGE SOP (Commercial)",
                    items: [],
                    isSOP: true,
                    content: `
          <div class="sop-step"><strong>🍳 STEP 2: HALF COOKING</strong><br>
          Airfryer 160°C · 18-20 min · Flip once · Pale golden · Internal temp ≥ 65°C</div>
          
          <div class="sop-step"><strong>❄️ STEP 3: RAPID COOLING</strong><br>
          Open tray · Fan air 20 min · Internal temp < 25°C · Surface dry</div>
          
          <div class="sop-step"><strong>🧊 STEP 4: IQF FREEZING</strong><br>
          Separate pieces · Single layer tray · -18°C · 2-3 hours until hard</div>
          
          <div class="sop-step"><strong>📦 STEP 5: VACUUM PACKING</strong><br>
          Vacuum seal / Ziplock + air press + double bag<br>
          Label: Product · Date · Batch · Expiry (60 days)</div>
          
          <div class="success-box"><strong>🔄 STEP 6: COOK FROM FROZEN</strong><br>
          ❌ No thaw needed<br>
          Airfryer: 190°C · 10-12 min · Butter brush last 2 min<br>
          Shallow Fry: Medium oil · 4-5 min flip</div>
          
          <div class="danger-box"><strong>⚠️ FOOD SAFETY RULES</strong><br>
          🚫 Never refreeze once thawed<br>
          🚫 Moisture inside pack = spoilage<br>
          🚫 Sour smell → discard<br>
          🚫 Always cook above 75°C final</div>
          
          <div class="info-box"><strong>💣 COMMERCIAL TRICKS</strong><br>
          🔥 3% maltodextrin/milk powder in coating → Freeze protection<br>
          🔥 Spray light oil before freezing → Ice crystal damage kam<br>
          🔥 Oxygen absorber pouch → Longer aroma retention</div>
        `
                },
                serving: {
                    name: "🍽 SERVING & BUSINESS",
                    items: [],
                    isInfo: true,
                    content: `
          <div class="success-box">
            <strong>🍽 SERVING STYLE</strong><br>
            ✅ Mint mayo dip · Onion rings · Lemon wedge · Light chat masala
          </div>
          <div class="info-box">
            <strong>💣 BUSINESS EDGE</strong><br>
            ✅ Selling price high · Oil usage low · Airfryer fast batch<br>
            ✅ Healthy perception · Repeat guaranteed 😎<br>
            🏭 Sell: Frozen packs · Ready-to-fry retail · Restaurant supply
          </div>
        `
                }
            };

            const tabKeys = ['softening', 'flavor', 'cooking', 'smoke', 'finishing', 'frozenSOP', 'serving'];
            const tabLabels = {
                softening: '🔪 Softening',
                flavor: '🔥 Flavor',
                cooking: '🍳 Cooking',
                smoke: '🌪 Smoke',
                finishing: '🌶 Finish',
                frozenSOP: '❄️ Frozen SOP',
                serving: '🍽 Serving'
            };

            let currentTab = 'softening';
            let currentKg = 3;
            let currentMeat = 'mutton';

            const meatKgInput = document.getElementById('meatKg');
            const meatTypeSelect = document.getElementById('meatType');
            const applyBtn = document.getElementById('applyBtn');
            const tabContainer = document.getElementById('tabContainer');
            const dynamicDiv = document.getElementById('dynamicRecipe');

            function formatSpoon(grams) {
                if (grams <= 0) return "0";
                if (grams < 1) {
                    const tsp = grams * 0.2;
                    if (tsp < 0.125) return `${grams.toFixed(1)}g`;
                    const fractions = { 0.125: '⅛', 0.25: '¼', 0.33: '⅓', 0.5: '½', 0.67: '⅔', 0.75: '¾' };
                    let closest = '', minDiff = Infinity;
                    for (const [val, frac] of Object.entries(fractions)) {
                        const diff = Math.abs(tsp - parseFloat(val));
                        if (diff < minDiff && diff < 0.1) { minDiff = diff; closest = frac; }
                    }
                    if (closest) return `${closest} tsp`;
                    return `${tsp.toFixed(1)} tsp`;
                }
                const tbsp = grams / 15;
                if (tbsp >= 0.5) {
                    const whole = Math.floor(tbsp);
                    const frac = tbsp - whole;
                    const fractions = { 0.125: '⅛', 0.25: '¼', 0.33: '⅓', 0.5: '½', 0.67: '⅔', 0.75: '¾' };
                    let fracStr = '', minDiff = 0.08;
                    for (const [val, f] of Object.entries(fractions)) {
                        const diff = Math.abs(frac - parseFloat(val));
                        if (diff < minDiff) { minDiff = diff; fracStr = f; }
                    }
                    if (whole === 0 && fracStr) return `${fracStr} tbsp`;
                    if (whole > 0 && fracStr) return `${whole}${fracStr} tbsp`;
                    if (whole > 0 && frac < 0.1) return `${whole} tbsp`;
                    return `${tbsp.toFixed(1)} tbsp`;
                }
                return `${(grams * 0.2).toFixed(1)} tsp`;
            }

            function scaleItems(baseItems, factor) {
                return baseItems.map(item => ({
                    ...item,
                    gram: parseFloat((item.gram * factor).toFixed(1))
                }));
            }

            function buildTabs() {
                tabContainer.innerHTML = '';
                tabKeys.forEach(key => {
                    const btn = document.createElement('button');
                    btn.className = 'tab';
                    btn.textContent = tabLabels[key];
                    btn.dataset.tab = key;
                    btn.addEventListener('click', () => switchTab(key));
                    tabContainer.appendChild(btn);
                });
            }

            function updateTabStyles(active) {
                document.querySelectorAll('#tabContainer .tab').forEach(t => {
                    t.classList.remove('active');
                    if (t.dataset.tab === active) t.classList.add('active');
                });
            }

            function switchTab(key) {
                currentTab = key;
                updateTabStyles(key);
                render(key, currentKg, currentMeat);
            }

            function render(tabKey, kg, meat) {
                const recipe = RECIPES[tabKey];
                const factor = kg / BASE_MEAT_KG;
                const restTime = meat === 'mutton' ? '10-12 hrs' : '18 hrs';
                const meatLabel = meat === 'mutton' ? 'Mutton' : 'Buffalo';

                let html = `
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem; margin-bottom:0.5rem;">
          <h2 style="color:#9a3412; margin:0; font-size:1.1rem;">${recipe.name}</h2>
          <span style="background:#1c1917; color:#fbbf24; padding:0.3rem 1rem; border-radius:2rem; font-weight:bold; font-size:0.85rem;">
            🥩 ${kg}kg ${meatLabel} Chap
          </span>
        </div>
      `;

                if (recipe.isSOP) {
                    html += recipe.content;
                } else if (recipe.isInfo) {
                    html += recipe.content;
                } else if (recipe.items && recipe.items.length > 0) {
                    const items = scaleItems(recipe.items, factor);
                    html += `<div class="info-box">📌 Base: ${BASE_MEAT_KG}kg · Factor: ${factor.toFixed(2)}x</div>`;

                    if (recipe.warn) {
                        html += `<div class="danger-box">${recipe.warn}</div>`;
                    }

                    html += `<div class="section-title">📋 Ingredients</div><div class="ingredient-list">`;

                    items.forEach(item => {
                        const noteText = item.note ? ` (${item.note})` : '';
                        const warnIcon = item.warn ? ' ⚠️' : '';
                        html += `
            <div class="ing-row">
              <span class="ing-name">🧾 ${item.name}${noteText}${warnIcon}</span>
              <span class="ing-qty">
                <span>${item.gram}g</span>
                ${item.gram > 0 ? `<span class="spoon-hint">${formatSpoon(item.gram)}</span>` : ''}
              </span>
            </div>
          `;
                    });

                    html += `</div>`;

                    if (recipe.method) {
                        const methodText = recipe.method.replace('10-12 hrs / Buffalo 18 hrs', restTime);
                        html += `<div class="info-box"><strong>🔧 Method:</strong><br>${methodText}</div>`;
                    }
                }

                // Show rest time for softening tab
                if (tabKey === 'softening') {
                    html += `<div class="info-box"><strong>🕒 Rest Time (${meatLabel}):</strong> ${restTime} (fridge)</div>`;
                }

                dynamicDiv.innerHTML = html;
            }

            function onCalculate() {
                let kg = parseFloat(meatKgInput.value);
                if (isNaN(kg) || kg < 0.5) kg = 0.5;
                if (kg > 100) kg = 100;
                meatKgInput.value = kg;
                currentKg = kg;
                currentMeat = meatTypeSelect.value;
                render(currentTab, currentKg, currentMeat);
            }

            meatTypeSelect.addEventListener('change', () => {
                currentMeat = meatTypeSelect.value;
                render(currentTab, currentKg, currentMeat);
            });

            applyBtn.addEventListener('click', onCalculate);
            meatKgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') onCalculate(); });
            meatKgInput.addEventListener('input', () => {
                let kg = parseFloat(meatKgInput.value);
                if (!isNaN(kg) && kg >= 0.5 && kg <= 100) {
                    currentKg = kg;
                    currentMeat = meatTypeSelect.value;
                    render(currentTab, currentKg, currentMeat);
                }
            });

            // Init
            buildTabs();
            updateTabStyles('softening');
            render('softening', 3, 'mutton');
            meatKgInput.value = 3;
            meatTypeSelect.value = 'mutton';
        })();
    </script>
</body>

</html>
