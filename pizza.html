<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>🍕 MFM Pizza Calc | R&D</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍕</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #451a03 0%, #78350f 100%);
            min-height: 100vh;
            padding: 1.5rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            max-width: 800px;
            width: 100%;
            background: #fffbeb;
            border-radius: 3rem 3rem 2.5rem 2.5rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
            padding: 2rem 1.8rem;
            border: 2px solid #fcd34d;
        }

        h1 {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 2.2rem;
            font-weight: 800;
            color: #dc2626;
            text-shadow: 2px 2px 0 #fde68a;
            margin-bottom: 0.4rem;
        }

        .subhead {
            text-align: center;
            color: #78350f;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: #fef3c7;
            display: inline-block;
            padding: 0.3rem 1.8rem;
            border-radius: 2rem;
            margin-left: auto;
            margin-right: auto;
            width: fit-content;
            font-size: 0.9rem;
            border: 1px solid #fbbf24;
        }

        .control-panel {
            background: #1c1917;
            border-radius: 2rem;
            padding: 1.5rem 1.2rem;
            margin-bottom: 1.8rem;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.6);
            color: #f5f5f4;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #292524;
            padding: 0.5rem 1.2rem;
            border-radius: 3rem;
        }

        .input-group label {
            font-weight: 700;
            color: #fed7aa;
            font-size: 1.2rem;
        }

        .input-group input,
        .input-group select {
            width: 85px;
            padding: 0.7rem 0.5rem;
            text-align: center;
            font-weight: 800;
            font-size: 1.2rem;
            background: #fef7ed;
            border: 2px solid #f59e0b;
            border-radius: 1.5rem;
            color: #78350f;
            outline: none;
        }

        .btn {
            background: #f59e0b;
            border: none;
            color: #1c1917;
            font-weight: 800;
            padding: 0.75rem 1.8rem;
            border-radius: 3rem;
            font-size: 1rem;
            cursor: pointer;
            background: linear-gradient(to bottom, #fbbf24, #d97706);
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.5);
            transition: 0.2s;
            border: 1px solid #fde68a;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .btn:hover {
            background: linear-gradient(to bottom, #fcd34d, #b45309);
            box-shadow: 0 6px 14px #f59e0b80;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin: 1.5rem 0 1rem;
            flex-wrap: wrap;
        }

        .tab {
            background: #e7e5e4;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 2.5rem;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            color: #44403c;
            background: #d6d3d1;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            white-space: nowrap;
        }

        .tab.active {
            background: #dc2626;
            color: white;
            box-shadow: 0 0 15px #f87171;
            border: 1px solid #fecaca;
        }

        .recipe-card {
            background: #fffbeb;
            border-radius: 2rem;
            padding: 1.5rem 1.2rem;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.25);
            border: 1px solid #fcd34d;
        }

        .section-title {
            font-weight: 800;
            font-size: 1.2rem;
            margin: 1rem 0 0.6rem;
            color: #92400e;
            border-left: 8px solid #dc2626;
            padding-left: 1rem;
            background: linear-gradient(to right, #fef9c3, transparent);
        }

        .ingredient-list {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            margin-bottom: 0.5rem;
        }

        .ing-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffffffd6;
            padding: 0.5rem 0.8rem;
            border-radius: 1rem;
            font-size: 0.9rem;
            border-bottom: 1px dashed #fcd34d;
            gap: 0.5rem;
        }

        .ing-name {
            font-weight: 600;
            color: #3b2f1e;
            flex: 1;
        }

        .ing-qty {
            font-weight: 800;
            background: #fef3c7;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            color: #92400e;
            font-size: 0.85rem;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .spoon-hint {
            font-weight: 600;
            color: #b45309;
            font-size: 0.8rem;
            background: #fde68a;
            padding: 0.15rem 0.6rem;
            border-radius: 1rem;
        }

        .info-box {
            background: #fef9c7;
            border-radius: 1.2rem;
            padding: 0.8rem 1rem;
            margin: 0.8rem 0;
            color: #713f12;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .footer-note {
            text-align: center;
            font-size: 0.75rem;
            color: #a16207;
            margin-top: 1rem;
            font-weight: 600;
        }

        @media (max-width: 500px) {
            .app-container {
                padding: 1.5rem 1rem;
            }

            .ing-row {
                flex-wrap: wrap;
            }

            .tab {
                font-size: 0.7rem;
                padding: 0.5rem 0.8rem;
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <h1>🍕 PIZZA CALC</h1>
        <div style="text-align: center;"><span class="subhead">R&D Recipes · Auto Scale</span></div>

        <div class="control-panel">
            <div class="input-group">
                <label>🍕</label>
                <input type="number" id="batchQty" value="2" min="1" max="50" step="1">
                <span style="color:#fcd34d; font-weight:bold;">Pizzas (12")</span>
            </div>
            <button class="btn" id="applyBtn"><span>🔄</span> Calculate</button>
        </div>

        <div class="tabs">
            <button id="doughTab" class="tab active">🍞 Dough</button>
            <button id="sauceTab" class="tab">🥫 Sauce</button>
        </div>

        <div id="dynamicRecipe" class="recipe-card"></div>
        <div class="footer-note">🍕 2 Large Pizza base batch · Scale as needed</div>
    </div>

    <script>
        (function () {
            const TSP_PER_GRAM = 0.2;
            const TBSP_PER_GRAM = 1 / 15;

            function formatSpoon(grams) {
                if (grams <= 0) return "0";
                if (grams < 1) {
                    const tsp = grams * TSP_PER_GRAM;
                    if (tsp < 0.125) return `${grams.toFixed(2)}g`;
                    const fractions = { 0.125: '⅛', 0.25: '¼', 0.33: '⅓', 0.5: '½', 0.67: '⅔', 0.75: '¾' };
                    let closest = '', minDiff = Infinity;
                    for (const [val, frac] of Object.entries(fractions)) {
                        const diff = Math.abs(tsp - parseFloat(val));
                        if (diff < minDiff && diff < 0.1) { minDiff = diff; closest = frac; }
                    }
                    if (closest) return `${closest} tsp`;
                    if (tsp >= 0.1) return `${tsp.toFixed(1)} tsp`;
                    return `${grams.toFixed(2)}g`;
                }
                const tbsp = grams * TBSP_PER_GRAM;
                if (tbsp >= 0.5) {
                    const whole = Math.floor(tbsp);
                    const frac = tbsp - whole;
                    const fractions = { 0.125: '⅛', 0.25: '¼', 0.33: '⅓', 0.5: '½', 0.67: '⅔', 0.75: '¾' };
                    let fracStr = '', minDiff = 0.08;
                    for (const [val, f] of Object.entries(fractions)) {
                        const diff = Math.abs(frac - parseFloat(val));
                        if (diff < minDiff) { minDiff = diff; fracStr = f; }
                    }
                    if (whole === 0 && fracStr) return `${fracStr} tbsp`;
                    if (whole > 0 && fracStr) return `${whole}${fracStr} tbsp`;
                    if (whole > 0 && frac < 0.1) return `${whole} tbsp`;
                    return `${tbsp.toFixed(1)} tbsp`;
                }
                const tsp = grams * TSP_PER_GRAM;
                return `${tsp.toFixed(1)} tsp`;
            }

            // Pizza Dough (Base: 2 × 12-inch Pizza)
            const PIZZA_DOUGH = {
                name: "🍞 Pizza Dough",
                baseFor: 2,
                items: [
                    { name: "Maida", gram: 500 },
                    { name: "Water", gram: 300 },
                    { name: "Instant Yeast", gram: 7 },
                    { name: "Olive Oil", gram: 30 },
                    { name: "Sugar", gram: 10 },
                    { name: "Salt", gram: 8 },
                    { name: "Milk Powder", gram: 15 },
                    { name: "Yogurt", gram: 25 }
                ]
            };

            // Pizza Sauce (Base: 2 Pizza)
            const PIZZA_SAUCE = {
                name: "🥫 Pizza Sauce",
                baseFor: 2,
                items: [
                    { name: "Tomato Puree", gram: 200 },
                    { name: "Garlic Paste", gram: 10 },
                    { name: "Olive Oil", gram: 15 },
                    { name: "Salt", gram: 3 },
                    { name: "Sugar", gram: 4 },
                    { name: "Oregano + Basil", gram: 3 },
                    { name: "Chilli Flakes", gram: 1 }
                ]
            };

            let currentTab = 'dough';
            let currentQty = 2;

            const qtyInput = document.getElementById('batchQty');
            const applyBtn = document.getElementById('applyBtn');
            const doughTab = document.getElementById('doughTab');
            const sauceTab = document.getElementById('sauceTab');
            const dynamicDiv = document.getElementById('dynamicRecipe');

            function scaleItems(baseItems, factor) {
                return baseItems.map(item => ({
                    ...item,
                    gram: parseFloat((item.gram * factor).toFixed(2))
                }));
            }

            function updateTabs(active) {
                [doughTab, sauceTab].forEach(t => t.classList.remove('active'));
                if (active === 'dough') doughTab.classList.add('active');
                else sauceTab.classList.add('active');
            }

            function render(tab, qty) {
                const recipe = tab === 'dough' ? PIZZA_DOUGH : PIZZA_SAUCE;
                const factor = qty / recipe.baseFor;
                const items = scaleItems(recipe.items, factor);

                let html = `
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem; margin-bottom:0.5rem;">
          <h2 style="color:#dc2626; margin:0;">${recipe.name}</h2>
          <span style="background:#1c1917; color:#fbbf24; padding:0.4rem 1.2rem; border-radius:2rem; font-weight:bold;">×${qty} Pizzas (12")</span>
        </div>
        <div class="info-box">📌 Base batch: ${recipe.baseFor} Pizzas · Scaling factor: ${factor.toFixed(2)}x</div>
        <div class="section-title">📋 Ingredients</div>
        <div class="ingredient-list">
      `;

                items.forEach(item => {
                    html += `
          <div class="ing-row">
            <span class="ing-name">🧾 ${item.name}</span>
            <span class="ing-qty">
              <span>${item.gram}g</span>
              <span class="spoon-hint">${formatSpoon(item.gram)}</span>
            </span>
          </div>
        `;
                });

                html += `</div>`;

                if (tab === 'dough') {
                    html += `<div class="info-box">
          <strong>🔧 Dough Method:</strong><br>
          1. Warm water + sugar + yeast → 10 min activate<br>
          2. Maida + milk powder + salt mix karo<br>
          3. Yeast mixture + oil + yogurt add karo<br>
          4. 8-10 min knead → smooth dough<br>
          5. 1.5-2 hour rise (double size)<br>
          6. Punch down → divide into ${qty} balls<br>
          7. 15 min rest → shape → bake at 250°C
        </div>`;
                } else {
                    html += `<div class="info-box">
          <strong>🔧 Sauce Method:</strong><br>
          1. Olive oil me garlic paste 1 min sauté<br>
          2. Tomato puree + all spices add<br>
          3. 15-20 min slow cook (thick consistency)<br>
          4. Cool karo → use on pizza base
        </div>`;
                }

                dynamicDiv.innerHTML = html;
            }

            function onCalculate() {
                let qty = parseInt(qtyInput.value, 10);
                if (isNaN(qty) || qty < 1) qty = 1;
                if (qty > 50) qty = 50;
                qtyInput.value = qty;
                currentQty = qty;
                render(currentTab, currentQty);
            }

            doughTab.addEventListener('click', () => {
                currentTab = 'dough';
                updateTabs('dough');
                render('dough', currentQty);
            });

            sauceTab.addEventListener('click', () => {
                currentTab = 'sauce';
                updateTabs('sauce');
                render('sauce', currentQty);
            });

            applyBtn.addEventListener('click', onCalculate);
            qtyInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') onCalculate(); });
            qtyInput.addEventListener('input', () => {
                let qty = parseInt(qtyInput.value, 10);
                if (!isNaN(qty) && qty >= 1 && qty <= 50) {
                    currentQty = qty;
                    render(currentTab, currentQty);
                }
            });

            updateTabs('dough');
            render('dough', 2);
            qtyInput.value = 2;
        })();
    </script>
</body>

</html>
